# ===============================
# 🔹 DATABASE CONFIG (PostgreSQL)
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/personal_data_inventory
spring.datasource.username=postgres
spring.datasource.password=2580

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


# ===============================
# 🔹 SERVER CONFIG
# ===============================
server.port=8080


# ===============================
# 🔹 REDIS CACHE (DAY 6)
# ===============================
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.redis.time-to-live=600000


# ===============================
# 🔹 JWT CONFIG
# ===============================
jwt.secret=your_secret_key_here
jwt.expiration=86400000


# ===============================
# 🔹 EMAIL CONFIG (SECURE - DAY 7)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=yashashjhj@gmail.com
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000


# ===============================
# 🔹 SWAGGER CONFIG
# ===============================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true


# ===============================
# 🔹 ACTUATOR CONFIG (DAY 10)
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always


# ===============================
# 🔹 LOGGING CONFIG (DAY 9 & 10)
# ===============================
logging.level.root=INFO
logging.level.com.internship.tool=DEBUG
logging.file.name=logs/app.log

# Optional: better log format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger - %msg%n